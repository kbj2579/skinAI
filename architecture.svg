<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="640" viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <linearGradient id="grad-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="url(#grad-bg)"/>

  <!-- ============ LAYER BANDS ============ -->
  <!-- Client layer -->
  <rect x="20" y="16" width="920" height="90" rx="14" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="36" y="34" font-size="10" fill="#93C5FD" font-weight="600" letter-spacing="1">CLIENT</text>

  <!-- Backend layer -->
  <rect x="20" y="128" width="920" height="90" rx="14" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="36" y="146" font-size="10" fill="#A78BFA" font-weight="600" letter-spacing="1">BACKEND</text>

  <!-- AI layer -->
  <rect x="20" y="252" width="920" height="200" rx="14" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="36" y="270" font-size="10" fill="#6EE7B7" font-weight="600" letter-spacing="1">AI / MODEL</text>

  <!-- Data layer -->
  <rect x="20" y="476" width="920" height="148" rx="14" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="36" y="494" font-size="10" fill="#FDBA74" font-weight="600" letter-spacing="1">STORAGE</text>

  <!-- ============ NODES ============ -->

  <!-- [1] React Frontend -->
  <g filter="url(#shadow)">
    <rect x="380" y="30" width="200" height="62" rx="12" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- React logo circle -->
    <circle cx="411" cy="61" r="14" fill="#20232A"/>
    <!-- React atom rings (simplified) -->
    <ellipse cx="411" cy="61" rx="12" ry="4.5" fill="none" stroke="#61DAFB" stroke-width="1.2"/>
    <ellipse cx="411" cy="61" rx="12" ry="4.5" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(60 411 61)"/>
    <ellipse cx="411" cy="61" rx="12" ry="4.5" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(120 411 61)"/>
    <circle cx="411" cy="61" r="2" fill="#61DAFB"/>
    <text x="432" y="55" font-size="13" font-weight="700" fill="#1E3A5F">React Frontend</text>
    <text x="432" y="71" font-size="10" fill="#64748B">Vite · TypeScript</text>
  </g>

  <!-- [2] FastAPI Backend -->
  <g filter="url(#shadow)">
    <rect x="380" y="142" width="200" height="62" rx="12" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- FastAPI logo (lightning bolt) -->
    <rect x="394" y="148" width="28" height="28" rx="6" fill="#009485"/>
    <polygon points="408,153 403,164 408,164 405,175 413,162 408,162 411,153" fill="#FFFFFF"/>
    <text x="430" y="168" font-size="13" font-weight="700" fill="#3C1D8F">FastAPI</text>
    <text x="430" y="183" font-size="10" fill="#64748B">Python · Async</text>
  </g>

  <!-- ============ AI NODES (row) ============ -->

  <!-- [3] Model Server (CNN) -->
  <g filter="url(#shadow)">
    <rect x="56" y="276" width="160" height="148" rx="12" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.5"/>
    <!-- CNN icon -->
    <rect x="76" y="292" width="120" height="62" rx="6" fill="#F0FDFA"/>
    <!-- grid lines representing layers -->
    <line x1="76" y1="308" x2="196" y2="308" stroke="#99F6E4" stroke-width="1"/>
    <line x1="76" y1="324" x2="196" y2="324" stroke="#99F6E4" stroke-width="1"/>
    <line x1="76" y1="340" x2="196" y2="340" stroke="#99F6E4" stroke-width="1"/>
    <line x1="106" y1="292" x2="106" y2="354" stroke="#99F6E4" stroke-width="1"/>
    <line x1="136" y1="292" x2="136" y2="354" stroke="#99F6E4" stroke-width="1"/>
    <line x1="166" y1="292" x2="166" y2="354" stroke="#99F6E4" stroke-width="1"/>
    <!-- circle nodes -->
    <circle cx="91" cy="300" r="5" fill="#0D9488"/>
    <circle cx="121" cy="300" r="5" fill="#0D9488"/>
    <circle cx="151" cy="300" r="5" fill="#0D9488"/>
    <circle cx="181" cy="300" r="5" fill="#0D9488"/>
    <circle cx="136" cy="331" r="5" fill="#14B8A6"/>
    <circle cx="136" cy="347" r="5" fill="#2DD4BF"/>
    <text x="136" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#0F4C47">Model Server</text>
    <text x="136" y="389" text-anchor="middle" font-size="10" fill="#64748B">CNN · 16 클래스</text>
    <text x="136" y="405" text-anchor="middle" font-size="10" fill="#64748B">두피 · 피부</text>
  </g>

  <!-- [4] Groq Agent -->
  <g filter="url(#shadow)">
    <rect x="280" y="276" width="160" height="148" rx="12" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
    <!-- Groq logo (stylized G) -->
    <circle cx="360" cy="330" r="30" fill="#1A1A2E"/>
    <text x="360" y="337" text-anchor="middle" font-size="22" font-weight="900" fill="#7C3AED">G</text>
    <rect x="360" y="325" width="22" height="8" rx="2" fill="#7C3AED"/>
    <text x="360" y="384" text-anchor="middle" font-size="13" font-weight="700" fill="#3B0764">Groq Agent</text>
    <text x="360" y="400" text-anchor="middle" font-size="10" fill="#64748B">진단 · 검증</text>
    <text x="360" y="415" text-anchor="middle" font-size="10" fill="#64748B">RAG 기반</text>
  </g>

  <!-- [5] Llama Model -->
  <g filter="url(#shadow)">
    <rect x="504" y="276" width="160" height="148" rx="12" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5"/>
    <!-- Llama icon (Meta style) -->
    <rect x="524" y="288" width="120" height="68" rx="8" fill="#FFF8E7"/>
    <!-- Stylized llama face -->
    <ellipse cx="584" cy="318" rx="28" ry="24" fill="#F59E0B" opacity="0.2"/>
    <text x="584" y="328" text-anchor="middle" font-size="30">🦙</text>
    <text x="584" y="384" text-anchor="middle" font-size="13" font-weight="700" fill="#78350F">Llama Model</text>
    <text x="584" y="400" text-anchor="middle" font-size="10" fill="#64748B">맞춤 조언</text>
    <text x="584" y="415" text-anchor="middle" font-size="10" fill="#64748B">개인화 출력</text>
  </g>

  <!-- [6] RAG / Vector DB -->
  <g filter="url(#shadow)">
    <rect x="728" y="276" width="160" height="148" rx="12" fill="#FFFFFF" stroke="#EC4899" stroke-width="1.5"/>
    <!-- Vector DB icon (cylinders) -->
    <ellipse cx="808" cy="306" rx="40" ry="10" fill="#FCE7F3" stroke="#EC4899" stroke-width="1"/>
    <rect x="768" y="306" width="80" height="36" fill="#FDF2F8" stroke="#EC4899" stroke-width="1"/>
    <ellipse cx="808" cy="342" rx="40" ry="10" fill="#FCE7F3" stroke="#EC4899" stroke-width="1"/>
    <!-- Lines inside cylinder -->
    <line x1="780" y1="318" x2="836" y2="318" stroke="#F9A8D4" stroke-width="1"/>
    <line x1="780" y1="328" x2="836" y2="328" stroke="#F9A8D4" stroke-width="1"/>
    <text x="808" y="384" text-anchor="middle" font-size="13" font-weight="700" fill="#831843">RAG DB</text>
    <text x="808" y="400" text-anchor="middle" font-size="10" fill="#64748B">논문 · 의학 지식</text>
    <text x="808" y="415" text-anchor="middle" font-size="10" fill="#64748B">벡터 검색</text>
  </g>

  <!-- ============ STORAGE NODES ============ -->

  <!-- [7] Supabase -->
  <g filter="url(#shadow)">
    <rect x="200" y="500" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
    <!-- Supabase logo (S bolt) -->
    <rect x="214" y="512" width="36" height="36" rx="6" fill="#1C1C1C"/>
    <polygon points="228,517 222,531 228,531 225,547 235,530 229,530 232,517" fill="#3ECF8E"/>
    <text x="258" y="532" font-size="13" font-weight="700" fill="#064E3B">Supabase</text>
    <text x="258" y="548" font-size="10" fill="#64748B">PostgreSQL DB</text>
    <text x="258" y="563" font-size="10" fill="#64748B">users · analyses</text>
    <text x="258" y="578" font-size="10" fill="#64748B">lesion_tracks</text>
  </g>

  <!-- [8] Cloudflare R2 -->
  <g filter="url(#shadow)">
    <rect x="560" y="500" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#F97316" stroke-width="1.5"/>
    <!-- Cloudflare logo (cloud) -->
    <rect x="574" y="512" width="36" height="36" rx="6" fill="#F97316"/>
    <text x="592" y="534" text-anchor="middle" font-size="18" fill="white">☁</text>
    <text x="618" y="532" font-size="13" font-weight="700" fill="#7C2D12">Cloudflare R2</text>
    <text x="618" y="548" font-size="10" fill="#64748B">이미지 저장소</text>
    <text x="618" y="563" font-size="10" fill="#64748B">S3 호환 · CDN</text>
    <text x="618" y="578" font-size="10" fill="#64748B">Presigned URL</text>
  </g>

  <!-- ============ ARROWS ============ -->

  <!-- Frontend → Backend -->
  <line x1="480" y1="92" x2="480" y2="140" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="448" y="106" width="64" height="16" rx="4" fill="#EFF6FF"/>
  <text x="480" y="118" text-anchor="middle" font-size="9" fill="#3B82F6">REST · JWT</text>

  <!-- Backend → Model Server -->
  <path d="M 380 185 L 136 185 L 136 274" stroke="#94A3B8" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <rect x="212" y="177" width="80" height="16" rx="4" fill="#F8FAFC"/>
  <text x="252" y="189" text-anchor="middle" font-size="9" fill="#64748B">이미지 전송</text>

  <!-- Backend → Groq -->
  <line x1="450" y1="204" x2="360" y2="274" stroke="#94A3B8" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Backend → Llama -->
  <line x1="510" y1="204" x2="584" y2="274" stroke="#94A3B8" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Groq ↔ RAG -->
  <line x1="440" y1="352" x2="726" y2="352" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <rect x="548" y="343" width="72" height="16" rx="4" fill="#FDF2F8"/>
  <text x="584" y="355" text-anchor="middle" font-size="9" fill="#EC4899">벡터 검색</text>

  <!-- Backend → Supabase -->
  <path d="M 430 204 L 300 204 L 300 498" stroke="#059669" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#arr-green)"/>
  <rect x="264" y="440" width="72" height="16" rx="4" fill="#F0FDF4"/>
  <text x="300" y="452" text-anchor="middle" font-size="9" fill="#059669">결과 저장</text>

  <!-- Backend → R2 -->
  <path d="M 530 204 L 660 204 L 660 498" stroke="#F97316" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <rect x="624" y="440" width="72" height="16" rx="4" fill="#FFF7ED"/>
  <text x="660" y="452" text-anchor="middle" font-size="9" fill="#F97316">이미지 저장</text>

  <!-- Model → Groq (results flow) -->
  <line x1="216" y1="350" x2="278" y2="350" stroke="#10B981" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="220" y="341" width="56" height="16" rx="4" fill="#F0FDF4"/>
  <text x="248" y="353" text-anchor="middle" font-size="9" fill="#10B981">분류 결과</text>

  <!-- ============ STEP NUMBERS ============ -->
  <circle cx="480" cy="113" r="8" fill="#3B82F6"/>
  <text x="480" y="117" text-anchor="middle" font-size="9" font-weight="700" fill="white">1</text>

  <circle cx="248" cy="194" r="8" fill="#8B5CF6"/>
  <text x="248" y="198" text-anchor="middle" font-size="9" font-weight="700" fill="white">2</text>

  <circle cx="243" cy="358" r="8" fill="#10B981"/>
  <text x="243" y="362" text-anchor="middle" font-size="9" font-weight="700" fill="white">3</text>

  <circle cx="584" cy="458" r="8" fill="#F97316"/>
  <text x="584" y="462" text-anchor="middle" font-size="9" font-weight="700" fill="white">4</text>

  <circle cx="300" cy="458" r="8" fill="#059669"/>
  <text x="300" y="462" text-anchor="middle" font-size="9" font-weight="700" fill="white">5</text>

  <!-- ============ TITLE ============ -->
  <text x="480" y="622" text-anchor="middle" font-size="11" fill="#94A3B8">AI 두피 · 안면피부 분석 서비스 — 시스템 아키텍처</text>
</svg>
